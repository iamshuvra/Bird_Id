# datasets/bird.yaml
#
# Tells YOLOv8 where to find training and validation images + labels.
#
# FOLDER STRUCTURE (after running the two preprocessing steps):
#
#   data/
#     videos/train/    ← original .mp4 clips (already downloaded)
#     videos/val/      ← original .mp4 clips (already downloaded)
#     labels/train/    ← VOC XML annotation files (already downloaded)
#     labels/val/      ← VOC XML annotation files (already downloaded)
#     images/train/    ← .jpg frames  (created by split_video_frames... script)
#     images/val/      ← .jpg frames  (created by split_video_frames... script)
#                         + YOLO .txt label files (created by convert_labels.py)
#
# PREPROCESSING ORDER (run these two steps before training):
#   Step 1:  python data/scripts/split_video_frames_for_object_detection.py --data_root_path data/
#   Step 2:  python datasets/convert_labels.py --data_root data/
#   Verify:  python datasets/verify_label.py --data_root data/

# Path is relative to where you run train.py from (the project root)
path:  data          # root data folder
train: images/train  # training images subfolder  (labels are .txt files in the same folder)
val:   images/val    # validation images subfolder

# Number of object classes
nc: 1

# Class names — only one class in this dataset
names:
  0: bird
